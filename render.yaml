# Render Blueprint — deploys the campaign worker as a background worker service.
# The Next.js web app is hosted on Vercel; only the long-running BullMQ worker
# runs here. https://render.com/docs/blueprint-spec
#
# After "New > Blueprint" and connecting this repo, set the secret env vars
# (marked sync:false) in the Render dashboard. REDIS_URL must be the Upstash
# rediss:// URL, and ENCRYPTION_KEY MUST match the value used by the Vercel app.
services:
  - type: worker
    name: wacampaign-worker
    runtime: node
    plan: starter            # background workers are not available on the free tier
    branch: main
    buildCommand: npm ci
    startCommand: npm run worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false           # Upstash rediss:// URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false           # must be IDENTICAL to the Vercel value
      - key: META_GRAPH_VERSION
        value: v18.0
